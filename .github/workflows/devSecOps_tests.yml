name: Security and Quality Checks for Akaunting

on:
  push:
    branches: [ main ] # Trigger workflow on push to 'main' branch
  pull_request:
    branches: [ main ] # Trigger on pull requests

jobs:
  build-docker:
    name: Build Akaunting Docker Image
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t akaunting:latest .

    - name: Push Docker Image
      run: docker tag akaunting:latest ${{ secrets.DOCKER_USERNAME }}/akaunting:latest
      run: docker push ${{ secrets.DOCKER_USERNAME }}/akaunting:latest

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Run OWASP Dependency-Check
      uses: actions/owasp-dependency-check-action@v2
      with:
        project: "Akaunting"
        format: "HTML"
        output-directory: "./dependency-check-report"

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install SonarQube Scanner
      run: |
        wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.8.0.2856-linux.zip
        unzip sonar-scanner-cli-4.8.0.2856-linux.zip -d $HOME
        export PATH="$HOME/sonar-scanner-4.8.0.2856-linux/bin:$PATH"

    - name: Run SonarQube
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        sonar-scanner \
          -Dsonar.projectKey=akaunting \
          -Dsonar.host.url=https://sonarqube.myserver.com \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  snyk:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Snyk
      run: npm install -g snyk

    - name: Authenticate Snyk
      run: snyk auth ${{ secrets.SNYK_TOKEN }}

    - name: Scan Docker Image with Snyk
      run: snyk container test ${{ secrets.DOCKER_USERNAME }}/akaunting:latest

  retirejs:
    name: Retire.js Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Retire.js
      run: npm install -g retire

    - name: Run Retire.js
      run: retire --outputpath ./retire-report.json

  sourceclear:
    name: SourceClear Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Run SourceClear
      run: |
        curl -sSL https://download.sourceclear.com/ci.sh | bash
